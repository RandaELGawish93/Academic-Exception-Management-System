<section id="actionView" class="view">
  <div class="page-heading">
    <div>
      <h2>Action Center</h2>
      <p>Preview one batch, assign student decisions, generate one official email, then send it.</p>
    </div>
  </div>

  <div class="split">
    <section class="panel">
      <h3>Pending Requests</h3>
      <div class="actions">
        <button type="button" data-refresh-data>Refresh</button>
        <button type="button" class="danger" id="bulkDeleteButton">Delete Selected</button>
      </div>
      <div id="pendingRequests"></div>
    </section>

    <aside class="panel">
      <h3>Preview Request</h3>
      <div id="requestPreview" class="preview-box">Select a request.</div>
      <label>Academic Office Note
        <textarea id="decisionNote"></textarea>
      </label>
      <div class="actions">
        <button type="button" id="markAllApprovedButton">Mark All Approved</button>
        <button type="button" id="markAllRejectedButton">Mark All Rejected</button>
        <button type="button" class="primary" id="generateEmailPreviewButton">Generate Email Preview</button>
        <button type="button" class="danger" id="deleteButton">Delete Request</button>
      </div>
      <h3>Preview Email</h3>
      <div id="emailPreviewMeta" class="info-note">Generate the batch email preview after all student decisions are set.</div>
      <div id="emailPreview" class="email-box">No email preview generated yet.</div>
      <div class="actions">
        <button type="button" class="primary" id="sendEmailButton">Send Email</button>
      </div>
    </aside>
  </div>

  <script>
    function bindActionCenter() {
      document.getElementById('bulkDeleteButton').addEventListener('click', deleteSelectedRequests);
      document.getElementById('deleteButton').addEventListener('click', deleteSelectedRequest);
      document.getElementById('generateEmailPreviewButton').addEventListener('click', generateEmailPreview);
      document.getElementById('sendEmailButton').addEventListener('click', sendSelectedEmail);
      document.getElementById('markAllApprovedButton').addEventListener('click', function() {
        applyDecisionToAll('Approved');
      });
      document.getElementById('markAllRejectedButton').addEventListener('click', function() {
        applyDecisionToAll('Rejected');
      });
    }

    function renderPendingRequests() {
      var target = document.getElementById('pendingRequests');

      if (!appState.user.isAcademicOffice) {
        target.innerHTML = '<p>Academic Office access is required.</p>';
        return;
      }

      if (!appState.pendingRequests.length) {
        target.innerHTML = '<p>No pending requests.</p>';
        resetActionCenterPreview();
        return;
      }

      target.innerHTML =
        '<table><thead><tr>' +
        '<th>Select</th><th>Batch</th><th>Teacher</th><th>Submitted By</th><th>Students</th><th>Submitted</th><th></th>' +
        '</tr></thead><tbody>' +
        appState.pendingRequests.map(function(request) {
          return '<tr>' +
            '<td><input type="checkbox" data-select-batch="' + escapeHtml(request.batchId) + '"></td>' +
            '<td>' + escapeHtml(request.batchId) + '</td>' +
            '<td>' + escapeHtml(request.teacherName) + '<br>' + escapeHtml(request.teacherEmail) + '</td>' +
            '<td>' + escapeHtml(request.submittedBy || '') + '<br>' + escapeHtml(request.submittedByRole || '') + '</td>' +
            '<td>' + escapeHtml(request.studentCount) + '</td>' +
            '<td>' + escapeHtml(request.submittedAt) + '</td>' +
            '<td><button type="button" data-preview-batch="' + escapeHtml(request.batchId) + '">Preview</button></td>' +
          '</tr>';
        }).join('') +
        '</tbody></table>';

      target.querySelectorAll('[data-preview-batch]').forEach(function(button) {
        button.addEventListener('click', function() {
          previewRequest(button.getAttribute('data-preview-batch'));
        });
      });

      target.querySelectorAll('[data-select-batch]').forEach(function(checkbox) {
        checkbox.addEventListener('change', updateSelectedBatches);
      });
    }

    function updateSelectedBatches() {
      appState.selectedBatchIds = Array.prototype.slice.call(document.querySelectorAll('[data-select-batch]:checked')).map(function(input) {
        return input.getAttribute('data-select-batch');
      });
    }

    function previewRequest(batchId) {
      appState.previewBatchId = batchId;
      appState.currentEmailPreview = null;
      runServer('getRequestDetails', [batchId], function(details) {
        appState.currentRequestDetails = details;
        renderRequestPreview(details);
        document.getElementById('emailPreviewMeta').textContent = 'Generate the batch email preview after all student decisions are set.';
        document.getElementById('emailPreview').textContent = 'No email preview generated yet.';
      });
    }

    function renderRequestPreview(details) {
      var request = details.request;
      var target = document.getElementById('requestPreview');

      target.innerHTML = [
        '<div class="request-meta"><strong>' + escapeHtml(request.batchId) + '</strong></div>',
        '<div class="request-meta">Teacher: ' + escapeHtml(request.teacherName) + ' (' + escapeHtml(request.teacherEmail) + ')</div>',
        '<div class="request-meta">HoD (CC): ' + escapeHtml(request.hodEmail || 'Not provided') + '</div>',
        '<div class="request-meta">Submitted By: ' + escapeHtml(request.submittedBy || '') + ' (' + escapeHtml(request.submittedByRole || '') + ')</div>',
        '<div class="request-meta">Submitted: ' + escapeHtml(request.submittedAt) + '</div>',
        '<div class="student-decision-list">' + details.students.map(function(student) {
          return renderStudentDecisionEditor(student);
        }).join('') + '</div>'
      ].join('');
    }

    function renderStudentDecisionEditor(student) {
      return [
        '<div class="decision-card">',
        '<div class="decision-card-header">',
        '<strong>' + escapeHtml(student.studentName) + '</strong>',
        '<span class="status Pending">' + escapeHtml(student.exceptionType) + '</span>',
        '</div>',
        '<div class="request-meta">' + escapeHtml(student.grade + ' | ' + student.subject) + '</div>',
        '<label>Decision<select data-decision-student-id="' + escapeHtml(student.studentId) + '">',
        '<option value="">Select</option>',
        '<option value="Approved">Approved</option>',
        '<option value="Rejected">Rejected</option>',
        '</select></label>',
        '<label>Decision Note<textarea data-decision-note="' + escapeHtml(student.studentId) + '">' + escapeHtml(student.decisionNote || '') + '</textarea></label>',
        renderStudentRequestDetails(student),
        '</div>'
      ].join('');
    }

    function renderStudentRequestDetails(student) {
      var details = student.details || {};

      if (student.exceptionType === 'Recurring Glitched Attempt' || student.exceptionType === 'Suspended Account') {
        return '<div class="detail-list">' + (details.assignments || []).map(function(assignment) {
          return '<div>' + escapeHtml(assignment.type) + ': Requested Grade ' + escapeHtml(assignment.requestedGrade) + '</div>';
        }).join('') + '</div>';
      }

      if (student.exceptionType === 'Academic Integrity') {
        if (details.incidentType === 'Plagiarism') {
          return '<div class="detail-list">Plagiarism | ' + escapeHtml(details.assignment || '') + '</div>';
        }

        return '<div class="detail-list">Cheating | ' + escapeHtml(details.assignment || '') + '<br>' + escapeHtml((details.behaviors || []).join(', ')) + '</div>';
      }

      return '';
    }

    function collectBatchDecisions() {
      if (!appState.currentRequestDetails) {
        showToast('Select a request first.');
        return null;
      }

      return appState.currentRequestDetails.students.map(function(student) {
        return {
          studentId: student.studentId,
          status: document.querySelector('[data-decision-student-id="' + student.studentId + '"]').value,
          note: document.querySelector('[data-decision-note="' + student.studentId + '"]').value.trim()
        };
      });
    }

    function applyDecisionToAll(status) {
      if (!appState.currentRequestDetails) {
        showToast('Select a request first.');
        return;
      }

      document.querySelectorAll('[data-decision-student-id]').forEach(function(select) {
        select.value = status;
      });
    }

    function generateEmailPreview() {
      if (!appState.previewBatchId) {
        showToast('Select a request first.');
        return;
      }

      var decisions = collectBatchDecisions();
      if (!decisions) {
        return;
      }

      runServer('previewDecisionEmail', [appState.previewBatchId, decisions, document.getElementById('decisionNote').value.trim()], function(result) {
        appState.currentRequestDetails = result.details;
        appState.currentEmailPreview = result.emailPreview;
        renderEmailPreview(result.emailPreview);
      });
    }

    function renderEmailPreview(preview) {
      document.getElementById('emailPreviewMeta').innerHTML =
        '<strong>To:</strong> ' + escapeHtml(preview.to) + '<br>' +
        '<strong>CC:</strong> ' + escapeHtml(preview.cc || 'None') + '<br>' +
        '<strong>Subject:</strong> ' + escapeHtml(preview.subject) + '<br>' +
        '<strong>Mode:</strong> ' + escapeHtml(preview.testMode ? 'Test Mode' : 'Live Send');
      document.getElementById('emailPreview').innerHTML = preview.htmlBody;
    }

    function deleteSelectedRequest() {
      if (!appState.previewBatchId) {
        showToast('Select a request first.');
        return;
      }

      runServer('deleteRequest', [appState.previewBatchId], function(delta) {
        resetActionCenterPreview();
        applyDelta(delta);
      });
    }

    function deleteSelectedRequests() {
      updateSelectedBatches();
      if (!appState.selectedBatchIds.length) {
        showToast('Select at least one request.');
        return;
      }

      runServer('deleteRequests', [appState.selectedBatchIds], function(delta) {
        appState.selectedBatchIds = [];
        resetActionCenterPreview();
        applyDelta(delta);
      });
    }

    function sendSelectedEmail() {
      if (!appState.previewBatchId) {
        showToast('Select a request first.');
        return;
      }

      var decisions = collectBatchDecisions();
      if (!decisions) {
        return;
      }

      runServer('sendDecisionEmail', [appState.previewBatchId, decisions, document.getElementById('decisionNote').value.trim()], function(delta) {
        resetActionCenterPreview();
        applyDelta(delta);
        showToast('Batch email sent and request removed from the Action Center.');
      });
    }

    function resetActionCenterPreview() {
      appState.previewBatchId = '';
      appState.currentRequestDetails = null;
      appState.currentEmailPreview = null;
      document.getElementById('requestPreview').textContent = 'Select a request.';
      document.getElementById('emailPreview').textContent = 'No email preview generated yet.';
      document.getElementById('emailPreviewMeta').textContent = 'Generate the batch email preview after all student decisions are set.';
      document.getElementById('decisionNote').value = '';
    }
  </script>
</section>
