<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <?!= include('Styles'); ?>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Academic Exception Management System (AEMS)</h1>
          <p id="schoolLabel">Request Manual Grading Insertion</p>
          <div class="user-context">
            <span id="userEmailLabel"></span>
            <span id="userRoleLabel" class="status Pending"></span>
          </div>
        </div>
        <nav class="main-nav" aria-label="Main navigation">
          <button type="button" data-view="home" class="active">Home</button>
          <button type="button" data-view="teacher">Submit Request</button>
          <button type="button" data-view="action" data-office-only>Action Center</button>
          <button type="button" data-view="dashboard" data-office-only>Dashboard</button>
        </nav>
      </header>

      <main>
        <section id="homeView" class="view active">
          <div class="page-heading">
            <div>
              <h2>Home</h2>
              <p id="yearLabel"></p>
            </div>
          </div>
          <div class="panel">
            <div id="homeIntro" class="info-text"></div>
            <div class="home-actions">
              <button type="button" class="primary" data-view="teacher">Open Submission Wizard</button>
              <button type="button" data-view="action" data-office-only>Open Action Center</button>
              <button type="button" data-refresh-data data-office-only>Refresh Data</button>
            </div>
          </div>
          <div id="homeDashboard"></div>
        </section>

        <?!= include('TeacherWizard'); ?>
        <?!= include('ActionCenterView'); ?>
        <?!= include('DashboardView'); ?>
      </main>
    </div>

    <div id="loadingOverlay" class="loading-overlay hidden" aria-live="assertive">
      <div class="loading-card">
        <span class="spinner" aria-hidden="true"></span>
        <span id="loadingMessage">Working…</span>
      </div>
    </div>

    <div id="toast" role="status" aria-live="polite"></div>

    <script>
      var appState = {
        user: {},
        settings: {},
        grades: [],
        subjects: [],
        exceptionTypes: [],
        formConfig: {},
        dashboard: {},
        pendingRequests: [],
        currentTeacherStep: 1,
        selectedBatchIds: [],
        previewBatchId: '',
        currentRequestDetails: null,
        currentEmailPreview: null,
        studentRowSeed: 0
      };

      document.addEventListener('DOMContentLoaded', function() {
        bindNavigation();
        bindTeacherWizard();
        bindActionCenter();
        bindDashboardSettings();
        loadInitialData();
      });

      var LOADING_MESSAGES = {
        getInitialData: 'Loading AEMS…',
        getHomeData: 'Refreshing data…',
        submitTeacherRequest: 'Saving request…',
        getRequestDetails: 'Loading request…',
        previewDecisionEmail: 'Generating email preview…',
        sendDecisionEmail: 'Sending email…',
        deleteRequest: 'Deleting request…',
        deleteRequests: 'Deleting requests…',
        saveAppSettings: 'Saving settings…',
        archiveAcademicYear: 'Archiving academic year…'
      };

      function runServer(functionName, args, onSuccess) {
        // Prevent duplicate submissions while a call is in flight.
        if (document.body.classList.contains('busy')) {
          return;
        }

        setBusy(true, LOADING_MESSAGES[functionName] || 'Working…');
        var runner = google.script.run
          .withSuccessHandler(function(result) {
            setBusy(false);
            onSuccess(result);
          })
          .withFailureHandler(function(error) {
            setBusy(false);
            showToast(error.message || 'Something went wrong.');
          });

        runner[functionName].apply(runner, args || []);
      }

      function loadInitialData() {
        runServer('getInitialData', [], function(data) {
          applyServerState(data);
          renderAll();
        });
      }

      function refreshHomeData() {
        runServer('getHomeData', [], function(data) {
          applyServerState(data);
          renderAll();
        });
      }

      function applyServerState(data) {
        appState.user = data.user || appState.user;
        appState.settings = data.settings || appState.settings;
        appState.grades = data.grades || appState.grades;
        appState.subjects = data.subjects || appState.subjects;
        appState.exceptionTypes = data.exceptionTypes || appState.exceptionTypes;
        appState.formConfig = data.formConfig || appState.formConfig;
        appState.dashboard = data.dashboard || appState.dashboard;
        appState.pendingRequests = data.pendingRequests || appState.pendingRequests;
      }

      function renderAll() {
        document.getElementById('schoolLabel').textContent = appState.settings.schoolName || 'Request Manual Grading Insertion';
        document.getElementById('yearLabel').textContent = 'Academic Year ' + (appState.settings.academicYear || '');
        document.getElementById('userEmailLabel').textContent = appState.user.email || '';
        document.getElementById('userRoleLabel').textContent = appState.user.role || '';
        document.getElementById('userRoleLabel').className = 'status ' + (appState.user.isAcademicOffice ? 'Approved' : 'Pending');
        document.getElementById('homeIntro').textContent = appState.user.isAcademicOffice
          ? 'Academic Office access is enabled. You can submit requests, process batches, manage settings, and send official review emails.'
          : 'Teacher access is enabled. Use the submission wizard to create a batch request for one or more students.';
        renderRoleAccess();
        renderDashboardCards('homeDashboard');
        renderTeacherOptions();
        renderPendingRequests();
        renderSettingsForm();
      }

      function renderRoleAccess() {
        document.querySelectorAll('[data-office-only]').forEach(function(element) {
          element.classList.toggle('hidden', !appState.user.isAcademicOffice);
        });

        if (!appState.user.isAcademicOffice && (document.getElementById('actionView').classList.contains('active') || document.getElementById('dashboardView').classList.contains('active'))) {
          showView('home');
        }
      }

      function bindNavigation() {
        document.body.addEventListener('click', function(event) {
          if (event.target.closest('[data-refresh-data]')) {
            refreshHomeData();
            return;
          }

          var button = event.target.closest('[data-view]');
          if (!button || button.classList.contains('hidden')) {
            return;
          }

          showView(button.getAttribute('data-view'));
        });
      }

      function showView(viewName) {
        if (!appState.user.isAcademicOffice && (viewName === 'action' || viewName === 'dashboard')) {
          viewName = 'home';
        }

        document.querySelectorAll('.view').forEach(function(view) {
          view.classList.remove('active');
        });
        document.querySelectorAll('.main-nav button').forEach(function(button) {
          button.classList.toggle('active', button.getAttribute('data-view') === viewName);
        });

        document.getElementById(viewName + 'View').classList.add('active');

        // Navigation is pure client-side and instantaneous. Data is refreshed
        // only after actions that change it, or via the explicit Refresh button.
      }

      function setBusy(isBusy, message) {
        document.body.classList.toggle('busy', isBusy);
        document.getElementById('loadingOverlay').classList.toggle('hidden', !isBusy);

        if (isBusy) {
          document.getElementById('loadingMessage').textContent = message || 'Working…';
        }
      }

      // Applies a delta response ({ removedBatchIds, dashboard }) by updating
      // only what changed, instead of reloading and re-rendering everything.
      function applyDelta(delta) {
        if (delta.dashboard) {
          appState.dashboard = delta.dashboard;
        }

        if (delta.removedBatchIds && delta.removedBatchIds.length) {
          appState.pendingRequests = appState.pendingRequests.filter(function(request) {
            return delta.removedBatchIds.indexOf(request.batchId) === -1;
          });
        }

        renderDashboardCards('homeDashboard');
        renderDashboardCards('dashboardCards');
        renderPendingRequests();
      }

      function showToast(message) {
        var toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        window.setTimeout(function() {
          toast.classList.remove('show');
        }, 3500);
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }
    </script>
  </body>
</html>
