<style>
  :root {
    --ink: #0d2b4d;
    --muted: #4a6288;
    --line: #d7e2ef;
    --surface: #ffffff;
    --surface-alt: #f4f7fc;
    --soft-blue: #e8f1fa;
    --primary: #0d2b4d;
    --primary-dark: #071d36;
    --secondary: #4a6fa5;
    --danger: #e53935;
    --success: #0d7a34;
    --warning: #0056b3;
    --notice: #ff5a1f;
    --shadow: 0 14px 36px rgba(13, 43, 77, 0.09);
    --shadow-soft: 0 8px 20px rgba(13, 43, 77, 0.07);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    color: var(--ink);
    background:
      radial-gradient(circle at top left, rgba(232, 241, 250, 0.95), transparent 34rem),
      linear-gradient(135deg, #f8fbff 0%, var(--surface-alt) 100%);
    font-family: Inter, Arial, Helvetica, sans-serif;
    font-size: 15px;
    line-height: 1.45;
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
  }

  button {
    min-height: 44px;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px 16px;
    color: #0056b3;
    background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    cursor: pointer;
    font-weight: 700;
    box-shadow: 0 2px 5px rgba(13, 43, 77, 0.04);
    transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease, background 160ms ease;
  }

  button:hover {
    border-color: var(--primary);
    box-shadow: 0 8px 18px rgba(13, 43, 77, 0.1);
    transform: translateY(-1px);
  }

  button.primary {
    border-color: var(--primary);
    color: #ffffff;
    background: linear-gradient(135deg, var(--primary) 0%, #123b69 100%);
  }

  button.primary:hover {
    background: var(--primary-dark);
  }

  button.danger {
    border-color: var(--danger);
    color: var(--danger);
    background: #ffffff;
  }

  button:disabled,
  .busy button {
    cursor: wait;
    opacity: 0.6;
  }

  input,
  select,
  textarea {
    width: 100%;
    min-height: 44px;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--ink);
    background: var(--surface);
    box-shadow: inset 0 1px 2px rgba(13, 43, 77, 0.03);
  }

  input:focus,
  select:focus,
  textarea:focus {
    border-color: var(--secondary);
    box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.14);
    outline: none;
  }

  textarea {
    min-height: 92px;
    resize: vertical;
  }

  label {
    display: grid;
    gap: 6px;
    color: var(--muted);
    font-weight: 700;
  }

  table {
    width: 100%;
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: 8px;
    border-collapse: collapse;
    background: var(--surface);
  }

  th,
  td {
    border-bottom: 1px solid var(--line);
    padding: 13px 14px;
    text-align: left;
    vertical-align: top;
  }

  th {
    color: var(--ink);
    background: var(--soft-blue);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0;
  }

  .app-shell {
    max-width: 1240px;
    margin: 0 auto;
    padding: 34px 28px;
  }

  .topbar {
    display: grid;
    grid-template-columns: minmax(320px, 1fr) minmax(360px, 590px);
    align-items: stretch;
    justify-content: space-between;
    gap: 30px;
    margin-bottom: 28px;
  }

  .topbar h1,
  .topbar p,
  .page-heading h2,
  .page-heading p {
    margin: 0;
  }

  .topbar h1 {
    max-width: 620px;
    color: var(--primary);
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 42px;
    line-height: 1.16;
    letter-spacing: 0;
  }

  .topbar p,
  .page-heading p {
    color: var(--muted);
  }

  .topbar p {
    position: relative;
    margin-top: 26px;
    font-size: 24px;
  }

  .topbar p::before {
    position: absolute;
    top: -18px;
    left: 0;
    width: 64px;
    height: 4px;
    border-radius: 999px;
    background: var(--danger);
    content: '';
  }

  .main-nav {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 16px;
    align-items: center;
    border: 1px solid rgba(215, 226, 239, 0.85);
    border-radius: 18px;
    padding: 26px 24px;
    background: rgba(255, 255, 255, 0.92);
    box-shadow: var(--shadow);
  }

  .main-nav button {
    min-height: 112px;
    border: 0;
    box-shadow: none;
    color: var(--ink);
    background: transparent;
    font-size: 15px;
  }

  .main-nav button::before {
    display: block;
    width: 44px;
    height: 44px;
    border: 2px solid var(--primary);
    border-radius: 8px;
    margin: 0 auto 12px;
    color: var(--primary);
    font-size: 13px;
    font-weight: 800;
    line-height: 40px;
    letter-spacing: 0;
  }

  .main-nav button[data-view="home"]::before {
    content: 'HM';
  }

  .main-nav button[data-view="teacher"]::before {
    content: 'TE';
  }

  .main-nav button[data-view="action"]::before {
    content: 'AO';
  }

  .main-nav button[data-view="dashboard"]::before {
    content: 'DB';
  }

  .main-nav button:hover {
    background: var(--surface-alt);
    box-shadow: none;
  }

  .main-nav button.active {
    color: var(--primary);
    background: var(--soft-blue);
  }

  .hidden {
    display: none !important;
  }

  .user-context {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 18px;
    align-items: center;
    color: var(--muted);
    font-size: 13px;
  }

  main {
    display: block;
  }

  .view.active {
    animation: fadeIn 180ms ease;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(4px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .page-heading h2 {
    color: var(--primary);
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 30px;
    line-height: 1.2;
  }

  .page-heading p {
    font-size: 16px;
  }

  .view {
    display: none;
  }

  .view.active {
    display: block;
  }

  .page-heading {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
  }

  .panel {
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 18px;
    background: rgba(255, 255, 255, 0.92);
    box-shadow: var(--shadow-soft);
  }

  .panel h3 {
    margin: 0 0 16px;
    color: var(--primary);
    font-size: 18px;
    text-transform: uppercase;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .actions,
  .home-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin: 18px 0;
  }

  .segmented {
    display: inline-flex;
    gap: 6px;
    padding: 6px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: #fbfdff;
    margin-bottom: 16px;
  }

  .segmented button {
    min-height: 38px;
    border: 0;
    box-shadow: none;
  }

  .segmented button.active {
    color: #ffffff;
    background: linear-gradient(135deg, var(--primary) 0%, #123b69 100%);
  }

  .info-text {
    color: var(--muted);
    font-size: 16px;
  }

  .info-note {
    margin-top: 10px;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--muted);
    background: #fbfdff;
    font-size: 13px;
  }

  .wizard-steps {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 18px;
  }

  .wizard-steps span {
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 10px 12px;
    color: #0056b3;
    background: #ffffff;
    text-align: center;
    font-weight: 700;
  }

  .wizard-steps span.active {
    border-color: var(--primary);
    color: #ffffff;
    background: linear-gradient(135deg, var(--primary) 0%, #123b69 100%);
  }

  .wizard-step {
    display: none;
  }

  .wizard-step.active {
    display: block;
  }

  .student-row {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr)) auto;
    gap: 12px;
    align-items: end;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
    background: #fbfdff;
  }

  .student-details {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }

  .choice-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }

  .choice-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: #ffffff;
    color: var(--ink);
    font-weight: 400;
  }

  .choice-chip input {
    width: auto;
    min-height: auto;
  }

  .assignment-block {
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #ffffff;
  }

  .assignment-title {
    margin-bottom: 10px;
    color: var(--primary);
    font-weight: 700;
  }

  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
    margin: 18px 0;
  }

  .metric {
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 20px;
    background: rgba(255, 255, 255, 0.92);
    box-shadow: var(--shadow-soft);
  }

  .metric span {
    color: var(--muted);
    font-weight: 700;
  }

  .metric strong {
    display: block;
    margin-top: 6px;
    color: var(--primary);
    font-size: 36px;
    line-height: 1;
  }

  .status {
    display: inline-block;
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 700;
  }

  .status.Pending {
    background: #e8f1fa;
    color: var(--warning);
  }

  .status.Approved {
    background: #dff5e6;
    color: var(--success);
  }

  .status.Rejected,
  .status.Deleted {
    background: #ffe8e7;
    color: var(--danger);
  }

  .split {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(300px, 420px);
    gap: 18px;
  }

  .preview-box,
  .email-box {
    min-height: 160px;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px;
    color: var(--ink);
    white-space: pre-wrap;
    background: #fbfdff;
  }

  #emailPreview {
    white-space: normal;
  }

  .request-meta {
    margin-bottom: 8px;
    color: var(--muted);
    font-size: 13px;
  }

  .student-decision-list {
    display: grid;
    gap: 12px;
    margin-top: 16px;
  }

  .decision-card {
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #ffffff;
  }

  .decision-card-header {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    margin-bottom: 8px;
  }

  .detail-list {
    margin-top: 10px;
    color: var(--muted);
    font-size: 13px;
  }

  .principal-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
  }

  .principal-mapping {
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #fbfdff;
  }

  .principal-mapping h4 {
    margin: 0 0 12px;
    color: var(--primary);
    font-size: 16px;
  }

  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--ink);
    font-weight: 400;
  }

  .checkbox-label input {
    width: auto;
    min-height: auto;
  }

  #toast {
    position: fixed;
    right: 20px;
    bottom: 20px;
    max-width: 360px;
    border-radius: 8px;
    padding: 12px 14px;
    color: #ffffff;
    background: linear-gradient(135deg, var(--primary) 0%, #123b69 100%);
    opacity: 0;
    transform: translateY(8px);
    transition: 180ms ease;
    pointer-events: none;
  }

  #toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 800px) {
    .app-shell {
      padding: 16px;
    }

    .topbar,
    .page-heading,
    .split {
      display: block;
    }

    .topbar h1 {
      font-size: 32px;
    }

    .topbar p {
      font-size: 20px;
    }

    .main-nav,
    .home-actions {
      margin-top: 14px;
    }

    .main-nav {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      padding: 16px;
    }

    .main-nav button {
      min-height: 86px;
    }

    .form-grid,
    .student-row,
    .student-details,
    .dashboard-grid,
    .wizard-steps,
    .principal-grid {
      grid-template-columns: 1fr;
    }

    table {
      display: block;
      overflow-x: auto;
    }
  }
</style>
